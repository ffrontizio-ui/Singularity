version: '3.8'

services:
  app:
    build: .
    container_name: singularity_app
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - .:/app
    environment:
      - TOR_PROXY=${TOR_PROXY:-socks5://tor:9050}
    depends_on:
      - tor
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  tor:
    image: osminogin/tor-simple:latest
    expose:
      - "9050"
    restart: always

  previewer:
    build: preview_service
    container_name: singularity_previewer
    environment:
      - TOR_PROXY=${TOR_PROXY:-socks5://tor:9050}
    depends_on:
      - tor
    restart: unless-stopped
    expose:
      - "8001"
